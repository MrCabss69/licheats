<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lichess Assistant</title>
  <link rel="stylesheet" href="popup.css">
  <script src="popup.js" defer></script>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Local Licheats</p>
    <h1>Opponent analysis</h1>
    <section class="panel">
      <span class="label">Opponent</span>
      <strong id="opponentNickname">Detecting...</strong>
    </section>
    <section id="status" class="status">Waiting for Lichess page context.</section>
    <section id="statsContainer" class="stats" hidden>
      <div><span>Games</span><strong id="gamesCount">0</strong></div>
      <div><span>Win rate</span><strong id="winRate">0%</strong></div>
      <div><span>Avg opponent</span><strong id="avgOpponent">n/a</strong></div>
      <div><span>Top opening</span><strong id="topOpening">n/a</strong></div>
    </section>
  </main>
</body>
</html>
